# 활성화할 프로필 설정
spring.profiles.active=prod
spring.application.name=shoppingmall-coco

# JWT 설정
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email 설정
email.dev-mode=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
email.from=noreply@coco.com
email.from-name=Coco

# 파일 업로드 용량 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# 소셜 로그인 (네이버)
naver.client-id=${NAVER_CLIENT_ID}
naver.client-secret=${NAVER_SECRET}

# 결제 (포트원)
iamport.api-key=${IAMPORT_KEY}
iamport.api-secret=${IAMPORT_SECRET}
