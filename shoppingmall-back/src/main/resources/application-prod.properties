# ==========================================
# 배포 환경 기본 설정
# ==========================================
spring.application.name=shoppingmall-coco

# ==========================================
# Oracle Cloud DB 연결 설정 (지갑 사용)
# ==========================================
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.url=jdbc:oracle:thin:@cocodbu25pmbufs5jswyhy_high?TNS_ADMIN=./wallet

# 오라클 클라우드 관리자 아이디, 비밀번호
spring.datasource.username=COCOTEAM4
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA / Hibernate 설정 (빈 DB에 테이블 자동 생성)
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# 클라우드 DB는 현재 텅 비어있으므로 update로 설정하여 테이블을 생성
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Cloudinary 이미지 호스팅
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================================
# CORS 설정
# ==========================================
cors.allowed-origins=${FRONTEND_URL}